name: Daily Log Meal Photos

on:
  schedule:
  # 05:21 JST = 20:21 UTC (previous day)
  - cron: "21 20 * * *"
  workflow_dispatch:
    inputs:
      execution_date:
        description: "Execution date in JST YYYY-MM-DD. Empty = auto"
        required: false
        type: string

jobs:
  trigger-meal-photos:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger meal photos run
        env:
          MEAL_PHOTOS_ENDPOINT: ${{ secrets.MEAL_PHOTOS_ENDPOINT }}
          HEALTH_API_KEY: ${{ secrets.HEALTH_API_KEY }}
          EXECUTION_DATE: ${{ github.event.inputs.execution_date }}
        run: |
          set -euo pipefail

          if [ -z "$MEAL_PHOTOS_ENDPOINT" ]; then
            echo "MEAL_PHOTOS_ENDPOINT is not set. Add it in GitHub Secrets." >&2
            exit 1
          fi

          if [ -z "$HEALTH_API_KEY" ]; then
            echo "HEALTH_API_KEY is not set. Add it in GitHub Secrets." >&2
            exit 1
          fi

          BODY="{}"
          if [ -n "${EXECUTION_DATE:-}" ]; then
            BODY="{\"execution_date\":\"$EXECUTION_DATE\"}"
          fi

          echo "Request body: $BODY"

          HTTP_STATUS=$(curl --fail-with-body -sS -o /tmp/meal_photos_response.json -w "%{http_code}" \
            -X POST "$MEAL_PHOTOS_ENDPOINT" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $HEALTH_API_KEY" \
            -d "$BODY") || {
              CURL_EXIT=$?
              echo "Worker returned non-2xx" >&2
              echo "HTTP status: ${HTTP_STATUS:-unknown}" >&2
              echo "Request body: $BODY" >&2
              echo "Response body:" >&2
              cat /tmp/meal_photos_response.json >&2 || true
              exit $CURL_EXIT
            }

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/meal_photos_response.json
