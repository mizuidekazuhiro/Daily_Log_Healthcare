name: Daily Log Healthcare Trigger

on:
  schedule:
    # 07:00 JST = 22:00 UTC (previous day)
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  trigger-workers:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Workers
        env:
          WORKERS_ENDPOINT: ${{ secrets.WORKERS_ENDPOINT }}
          WORKERS_BEARER_TOKEN: ${{ secrets.WORKERS_BEARER_TOKEN }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$WORKERS_ENDPOINT" \
            -H "Authorization: Bearer $WORKERS_BEARER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}'
